<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>clarity-guild.live — maintenance</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #21262d;
    --fg:      #e6edf3;
    --fg2:     #7d8590;
    --green:   #4ade80;
    --green2:  #166534;
    --green3:  #14532d;
    --discord: #5865f2;
    --discord-hover: #4752c4;
    --red:     #f87171;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Consolas, 'Liberation Mono', monospace;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem;
    overflow: hidden;
  }

  /* Login button — fixed top right */
  .login-btn {
    position: fixed;
    top: 1.25rem;
    right: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--discord);
    color: #fff;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.55rem 1.1rem;
    border-radius: 8px;
    transition: background 0.15s;
    z-index: 10;
    letter-spacing: 0.01em;
  }
  .login-btn:hover { background: var(--discord-hover); }
  .login-btn svg { flex-shrink: 0; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 3.5rem;
    max-width: 540px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .badge {
    display: inline-block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    border: 1px solid var(--green2);
    background: rgba(74, 222, 128, 0.06);
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    margin-bottom: 2rem;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.02em;
    line-height: 1.15;
    text-wrap: balance;
    margin-bottom: 0.5rem;
  }
  h1 span { color: var(--green); }

  .es {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: var(--fg2);
    font-weight: 400;
    margin-bottom: 2.5rem;
    font-style: italic;
  }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 2rem;
  }

  .note {
    font-size: 0.8rem;
    color: var(--fg2);
    line-height: 1.6;
  }

  .error-msg {
    display: none;
    margin-bottom: 1.5rem;
    padding: 0.65rem 1rem;
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248, 113, 113, 0.25);
    border-radius: 8px;
    color: var(--red);
    font-size: 0.82rem;
    line-height: 1.5;
  }

  /* Bypass code section */
  .bypass-toggle {
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: var(--fg2);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    font-family: inherit;
  }
  .bypass-toggle:hover { color: var(--fg); }

  .bypass-form {
    display: none;
    margin-top: 1rem;
    gap: 0.5rem;
    flex-direction: row;
  }
  .bypass-form.open { display: flex; }

  .bypass-input {
    flex: 1;
    padding: 0.55rem 0.8rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--fg);
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
  }
  .bypass-input:focus { border-color: var(--green); }

  .bypass-submit {
    padding: 0.55rem 0.9rem;
    background: var(--green2);
    border: none;
    border-radius: 6px;
    color: var(--green);
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
  .bypass-submit:hover { background: #15803d; }

  /* grass strip */
  .grass {
    position: fixed;
    bottom: 0; left: 0;
    width: 100%; height: 80px;
    display: flex;
    align-items: flex-end;
    pointer-events: none;
    z-index: 0;
  }

  .blade { flex: 1; transform-origin: bottom center; animation: sway 3s ease-in-out infinite; }
  .blade::after {
    content: '';
    display: block;
    margin: 0 auto;
    border-radius: 999px 999px 2px 2px;
    background: var(--green3);
  }
  .blade:nth-child(odd)::after  { width: 4px; height: 28px; background: var(--green2); }
  .blade:nth-child(3n)::after   { width: 3px; height: 20px; }
  .blade:nth-child(5n)::after   { width: 5px; height: 36px; background: #15803d; }
  .blade:nth-child(7n)::after   { width: 3px; height: 16px; }
  .blade:nth-child(11n)::after  { width: 4px; height: 44px; background: #4ade80; opacity: 0.6; }

  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    30%       { transform: rotate(4deg); }
    70%       { transform: rotate(-3deg); }
  }
  .blade:nth-child(2n)  { animation-delay: -0.7s; }
  .blade:nth-child(3n)  { animation-delay: -1.4s; }
  .blade:nth-child(5n)  { animation-delay: -0.3s; }
  .blade:nth-child(7n)  { animation-delay: -2.1s; }
  .blade:nth-child(11n) { animation-delay: -1.0s; }

  @media (prefers-reduced-motion: reduce) {
    .blade { animation: none; }
  }
</style>
</head>
<body>

<a href="/auth/discord" class="login-btn">
  <svg width="16" height="12" viewBox="0 0 71 55" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
    <path d="M60.1 4.9A58.6 58.6 0 0 0 45.5.8a41 41 0 0 0-1.8 3.7 54.2 54.2 0 0 0-16.3 0A39.6 39.6 0 0 0 25.6.8 58.5 58.5 0 0 0 11 4.9C1.6 19.1-.9 32.9.3 46.6a59 59 0 0 0 18 9.1 44.5 44.5 0 0 0 3.8-6.2 38.4 38.4 0 0 1-6-2.9l1.5-1.1a42.1 42.1 0 0 0 36 0l1.5 1.1a38.3 38.3 0 0 1-6 2.9 44.4 44.4 0 0 0 3.8 6.2 58.8 58.8 0 0 0 18-9.1C72 30.6 68.2 17 60.1 4.9ZM23.7 38.3c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.4 7.2s-2.9 7.2-6.4 7.2Zm23.5 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.5 0 6.4 3.2 6.4 7.2s-2.9 7.2-6.4 7.2Z"/>
  </svg>
  I touched grass
</a>

<div class="card">
  <div class="badge">maintenance</div>

  <div class="error-msg" id="errorMsg"></div>

  <h1>go touch <span>grass</span> pls</h1>
  <p class="es">ve a tocar hierba, pls</p>
  <div class="divider"></div>
  <p class="note">clarity-guild.live is briefly offline.<br>check back in a little while.</p>

  <button class="bypass-toggle" id="bypassToggle">have a bypass code?</button>
  <div class="bypass-form" id="bypassForm">
    <input class="bypass-input" id="bypassInput" type="text" placeholder="paste your code here" autocomplete="off">
    <button class="bypass-submit" id="bypassSubmit">go</button>
  </div>
</div>

<div class="grass" id="grass"></div>

<script>
  // Grass blades
  const g = document.getElementById('grass');
  const n = Math.floor(window.innerWidth / 6);
  for (let i = 0; i < n; i++) {
    const b = document.createElement('div');
    b.className = 'blade';
    g.appendChild(b);
  }

  // Error messages
  const errors = {
    unauthorized:  'You\'re not a Clarity guild member. Ask an officer to add you.',
    invalid_token: 'That bypass code is invalid or has been revoked.',
    oauth_error:   'Something went wrong with Discord login. Try again.',
    no_code:       'Discord login was cancelled.',
  };
  const params = new URLSearchParams(window.location.search);
  const err = params.get('error');
  if (err) {
    const el = document.getElementById('errorMsg');
    el.textContent = errors[err] || 'An error occurred. Please try again.';
    el.style.display = 'block';
  }

  // Bypass toggle
  document.getElementById('bypassToggle').addEventListener('click', () => {
    const form = document.getElementById('bypassForm');
    form.classList.toggle('open');
    if (form.classList.contains('open')) document.getElementById('bypassInput').focus();
  });

  document.getElementById('bypassSubmit').addEventListener('click', () => {
    const code = document.getElementById('bypassInput').value.trim();
    if (code) window.location.href = '/auth/bypass/' + encodeURIComponent(code);
  });

  document.getElementById('bypassInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('bypassSubmit').click();
  });
</script>

</body>
</html>
