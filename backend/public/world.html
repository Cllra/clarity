<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clarity vs World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0806;
      --bg2:       #120f08;
      --bg3:       #181208;
      --border:    #3d2e10;
      --gold:      #e8c060;
      --gold2:     #f0d485;
      --gold-dim:  #7a5a18;
      --text:      #f0e8cc;
      --text-dim:  #8a7850;
      --green:     #d4a020;
      --red:       #e06040;
      --glow:      rgba(232,192,96,0.15);
      --clarity:   rgba(179,136,255,0.08);
      --clarity-border: rgba(179,136,255,0.35);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(180,120,20,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(200,150,30,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #root { position: relative; z-index: 1; }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 40px 24px 28px;
      position: relative;
    }

    .header::after {
      content: '';
      display: block;
      width: 200px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto 0;
    }

    .back-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 8px 14px;
      cursor: pointer;
      text-decoration: none;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: all 0.2s;
    }
    .back-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

    .header-eyebrow {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
    }

    .header-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 6px;
      line-height: 1;
    }

    .header-sub {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 2px;
      margin-top: 8px;
    }

    .header-stats {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* ── Nav ── */
    .nav-wrapper {
      padding: 0 24px 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .nav-section-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      margin-top: 18px;
    }

    .nav-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 16px;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }

    .nav-btn:hover { border-color: var(--gold-dim); color: var(--gold2); }
    .nav-btn.active { background: rgba(232,192,96,0.1); border-color: var(--gold); color: var(--gold); }

    /* ── Content ── */
    .content {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    .skill-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .skill-title {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--gold2);
      letter-spacing: 3px;
    }

    .skill-count { font-size: 12px; color: var(--text-dim); letter-spacing: 2px; }

    /* ── Table ── */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border);
      background: var(--bg2);
      position: relative;
    }

    .table-wrapper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }

    thead th {
      font-family: 'Rajdhani', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 13px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: var(--bg3);
    }
    thead th.num { text-align: right; }

    tbody tr {
      border-bottom: 1px solid rgba(61,46,16,0.5);
      transition: background 0.15s;
      animation: fadeIn 0.3s ease both;
    }
    tbody tr:hover { background: rgba(232,192,96,0.03); }
    tbody tr:last-child { border-bottom: none; }

    /* Clarity-Mitglieder hervorheben */
    tbody tr.is-clarity { background: var(--clarity); }
    tbody tr.is-clarity:hover { background: rgba(179,136,255,0.12); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    td { padding: 12px 16px; vertical-align: middle; white-space: nowrap; }

    .td-rank { width: 56px; font-family: 'Cinzel', serif; font-size: 13px; color: var(--text-dim); }
    .rank-1 { color: #ffd700; }
    .rank-2 { color: #c0c0c0; }
    .rank-3 { color: #cd7f32; }
    .rank-medal { display: inline-block; width: 28px; height: 28px; line-height: 28px; text-align: center; border-radius: 50%; font-size: 12px; }
    .rank-1 .rank-medal { background: rgba(255,215,0,0.15); border: 1px solid rgba(255,215,0,0.3); }
    .rank-2 .rank-medal { background: rgba(192,192,192,0.1); border: 1px solid rgba(192,192,192,0.2); }
    .rank-3 .rank-medal { background: rgba(205,127,50,0.12); border: 1px solid rgba(205,127,50,0.25); }

    .td-region { width: 50px; font-size: 18px; text-align: center; }

    .td-name { font-size: 15px; font-weight: 500; color: var(--text); letter-spacing: 0.5px; }

    .clarity-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: rgba(179,136,255,0.15);
      color: #b388ff;
      border: 1px solid var(--clarity-border);
      border-radius: 3px;
      padding: 1px 5px;
      margin-left: 7px;
      vertical-align: middle;
    }

    .td-value { text-align: right; font-size: 15px; font-weight: 600; color: var(--gold2); font-family: 'Cinzel', serif; letter-spacing: 1px; }

    .td-gain { text-align: right; font-size: 13px; font-weight: 500; min-width: 90px; }

    .gain-pos  { color: var(--green); font-size: 15px; font-weight: 700; }
    .gain-neg  { color: var(--red);   font-size: 15px; font-weight: 700; }
    .gain-zero { color: var(--text-dim); }
    .gain-null { color: var(--text-dim); font-size: 11px; letter-spacing: 1px; }

    /* ── Add Player ── */
    .add-section {
      margin-top: 32px;
      padding: 24px;
      border: 1px solid var(--border);
      background: var(--bg2);
    }

    .add-title {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      color: var(--gold-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .add-input {
      flex: 1;
      min-width: 200px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--gold-dim); }
    .add-input::placeholder { color: var(--text-dim); }

    .add-select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      padding: 9px 14px;
      outline: none;
      cursor: pointer;
    }

    .add-btn {
      background: rgba(232,192,96,0.1);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 9px 20px;
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    }
    .add-btn:hover { background: rgba(232,192,96,0.18); }
    .add-btn:disabled { opacity: 0.4; cursor: default; }

    .add-results { margin-top: 14px; }

    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      background: var(--bg3);
      margin-top: 6px;
    }

    .search-result-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); }
    .search-result-region { font-size: 12px; color: var(--text-dim); }

    .add-result-btn {
      background: none;
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-result-btn:hover { border-color: var(--gold); color: var(--gold); }
    .add-result-btn:disabled { opacity: 0.4; cursor: default; }

    .add-message {
      margin-top: 10px;
      font-size: 13px;
      letter-spacing: 1px;
      color: var(--text-dim);
    }
    .add-message.ok  { color: var(--green); }
    .add-message.err { color: var(--red); }

    /* ── State ── */
    .state-center { text-align: center; padding: 80px 24px; color: var(--text-dim); }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .state-label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; }

    @media (max-width: 600px) {
      .header { padding: 48px 16px 24px; }
      .back-btn { top: 12px; left: 12px; }
      .nav-wrapper, .content { padding-left: 16px; padding-right: 16px; }
      td, thead th { padding: 9px 10px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const REGIONS = ['all','EU','NA','SA','KR','JP','RU','TR','TW','ASIA'];

    const SKILLS = [
      { key: 'life_fame',           label: 'Life Fame',           icon: '✦', group: 'overview' },
      { key: 'contribution_points', label: 'Contribution Points', icon: '🔷', group: 'overview' },
      { key: 'energy',              label: 'Energy',              icon: '⚡', group: 'overview' },
      { key: 'cooking',     label: 'Cooking',     icon: '🍳', group: 'lifeskill' },
      { key: 'alchemy',     label: 'Alchemy',     icon: '⚗️', group: 'lifeskill' },
      { key: 'processing',  label: 'Processing',  icon: '⚙️', group: 'lifeskill' },
      { key: 'gathering',   label: 'Gathering',   icon: '🌿', group: 'lifeskill' },
      { key: 'fishing',     label: 'Fishing',     icon: '🎣', group: 'lifeskill' },
      { key: 'hunting',     label: 'Hunting',     icon: '🏹', group: 'lifeskill' },
      { key: 'training',    label: 'Training',    icon: '🐎', group: 'lifeskill' },
      { key: 'trading',     label: 'Trading',     icon: '💰', group: 'lifeskill' },
      { key: 'farming',     label: 'Farming',     icon: '🌾', group: 'lifeskill' },
      { key: 'sailing',     label: 'Sailing',     icon: '⛵', group: 'lifeskill' },
      { key: 'barter',      label: 'Barter',      icon: '🔄', group: 'lifeskill' },
    ];

    function GainCell({ value }) {
      if (value === null || value === undefined) return <span className="gain-null">–</span>;
      if (value === 0)  return <span className="gain-zero">±0</span>;
      if (value > 0)    return <span className="gain-pos">+{value}</span>;
      return <span className="gain-neg">{value}</span>;
    }

    function RankCell({ rank }) {
      const cls   = rank <= 3 ? `rank-${rank}` : '';
      const label = rank <= 3 ? ['🥇','🥈','🥉'][rank - 1] : rank;
      return (
        <td className={`td-rank ${cls}`}>
          <span className="rank-medal">{label}</span>
        </td>
      );
    }

    function SortIcon({ active }) {
      return <span style={{ marginLeft: 4, opacity: active ? 1 : 0.3, fontSize: 10 }}>▼</span>;
    }

    function GlobalLeaderboard({ skill, region }) {
      const [data, setData]       = useState(null);
      const [loading, setLoading] = useState(true);
      const [sortBy, setSortBy]   = useState('value');

      useEffect(() => {
        setLoading(true);
        setData(null);
        setSortBy('value');
        fetch(`/api/global/leaderboard/${skill}?region=${region}`)
          .then(r => r.json())
          .then(d => { setData(d); setLoading(false); })
          .catch(() => setLoading(false));
      }, [skill, region]);

      const info = SKILLS.find(s => s.key === skill);

      const sorted = data ? [...data].sort((a, b) => {
        if (sortBy === '7d')    return (b.gain_7d ?? -Infinity) - (a.gain_7d ?? -Infinity);
        if (sortBy === 'month') return (b.gain_month ?? -Infinity) - (a.gain_month ?? -Infinity);
        return a.rank - b.rank;
      }).map((row, i) => ({ ...row, displayRank: i + 1 })) : [];

      if (loading) return (
        <div className="state-center">
          <div className="spinner" />
          <div className="state-label">Loading</div>
        </div>
      );

      if (!data || data.length === 0) return (
        <div className="state-center">
          <div className="state-label">No data yet — pool empty or scrape still running</div>
        </div>
      );

      return (
        <>
          <div className="skill-header">
            <span className="skill-title">{info?.icon} {info?.label}</span>
            <span className="skill-count">{data.length} players in pool</span>
          </div>
          <div className="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th style={{width:56}}>#</th>
                  <th style={{width:50}}>Region</th>
                  <th>Name</th>
                  <th className="num" style={{cursor:'pointer',userSelect:'none'}} onClick={() => setSortBy('value')}>
                    Level <SortIcon active={sortBy==='value'} />
                  </th>
                  <th className="num" style={{cursor:'pointer',userSelect:'none'}} onClick={() => setSortBy('7d')}>
                    +7 Days <SortIcon active={sortBy==='7d'} />
                  </th>
                  <th className="num" style={{cursor:'pointer',userSelect:'none'}} onClick={() => setSortBy('month')}>
                    This Month <SortIcon active={sortBy==='month'} />
                  </th>
                </tr>
              </thead>
              <tbody>
                {sorted.map((row, i) => (
                  <tr key={row.name} className={row.is_clarity ? 'is-clarity' : ''} style={{animationDelay:`${i*15}ms`}}>
                    <RankCell rank={row.displayRank} />
                    <td className="td-region" title={row.region}>{row.region_emoji}</td>
                    <td className="td-name">
                      {row.name}
                      {row.is_clarity && <span className="clarity-badge">CLARITY</span>}
                    </td>
                    <td className="td-value">{row.display}</td>
                    <td className="td-gain"><GainCell value={row.gain_7d} /></td>
                    <td className="td-gain"><GainCell value={row.gain_month} /></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </>
      );
    }

    function AddPlayer() {
      const [name, setName]           = useState('');
      const [region, setRegion]       = useState('EU');
      const [searching, setSearching] = useState(false);
      const [results, setResults]     = useState(null);
      const [message, setMessage]     = useState(null);

      async function handleSearch() {
        if (!name.trim()) return;
        setSearching(true);
        setResults(null);
        setMessage(null);
        try {
          const res = await fetch(`/api/global/player/search?name=${encodeURIComponent(name)}&region=${region}`);
          const data = await res.json();
          if (!res.ok) {
            setMessage({ type: 'err', text: `Search unavailable: ${data.error || 'BDO API unreachable'}` });
          } else {
            const list = Array.isArray(data) ? data : (data.list || []);
            setResults(list);
            if (list.length === 0) setMessage({ type: 'err', text: 'No results found' });
          }
        } catch (e) {
          setMessage({ type: 'err', text: 'Connection error' });
        }
        setSearching(false);
      }

      async function handleAdd(profileTarget, r) {
        setMessage(null);
        try {
          const res = await fetch('/api/global/player/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ profileTarget, region: r }),
          });
          const data = await res.json();
          if (data.added) setMessage({ type: 'ok', text: `✓ Player added to pool — will be captured in the next scrape` });
          else setMessage({ type: 'ok', text: `Player is already in the pool` });
          setResults(null);
          setName('');
        } catch (e) {
          setMessage({ type: 'err', text: 'Error adding player' });
        }
      }

      return (
        <div className="add-section">
          <div className="add-title">Add Player to Pool</div>
          <div className="add-row">
            <input
              className="add-input"
              placeholder="Search family name..."
              value={name}
              onChange={e => setName(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSearch()}
            />
            <select className="add-select" value={region} onChange={e => setRegion(e.target.value)}>
              {['EU','NA','SA','KR','JP','RU','TR','TW','ASIA'].map(r => (
                <option key={r} value={r}>{r}</option>
              ))}
            </select>
            <button className="add-btn" onClick={handleSearch} disabled={searching || !name.trim()}>
              {searching ? 'Searching...' : 'Search'}
            </button>
          </div>

          {results && results.length > 0 && (
            <div className="add-results">
              {results.map(r => (
                <div key={r.profileTarget || r.profile_target} className="search-result">
                  <span className="search-result-name">{r.familyName || r.name || r.profileTarget}</span>
                  <span className="search-result-region">{r.region || region}</span>
                  <button
                    className="add-result-btn"
                    onClick={() => handleAdd(r.profileTarget || r.profile_target, r.region || region)}
                  >
                    + Add
                  </button>
                </div>
              ))}
            </div>
          )}

          {message && (
            <div className={`add-message ${message.type}`}>{message.text}</div>
          )}
        </div>
      );
    }

    function App() {
      const [skill, setSkill]   = useState('life_fame');
      const [region, setRegion] = useState('all');
      const [stats, setStats]   = useState(null);

      useEffect(() => {
        fetch('/api/global/stats').then(r => r.json()).then(setStats).catch(() => {});
      }, []);

      return (
        <>
          <header className="header">
            <a href="/" className="back-btn">← Guild</a>
            <div className="header-eyebrow">Black Desert Online · Global</div>
            <h1 className="header-title">CLARITY VS WORLD</h1>
            <div className="header-sub">Global Leaderboard</div>
            {stats && (
              <div className="header-stats">
                {stats.total_players} players in pool
                {stats.latest_date ? ` · As of: ${stats.latest_date}` : ' · No scrape yet'}
              </div>
            )}
          </header>

          <nav className="nav-wrapper">
            <div className="nav-section-label">Region</div>
            <div className="nav-grid">
              {REGIONS.map(r => (
                <button
                  key={r}
                  className={`nav-btn ${region === r ? 'active' : ''}`}
                  onClick={() => setRegion(r)}
                >
                  {r === 'all' ? '🌍 All' : r}
                </button>
              ))}
            </div>

            <div className="nav-section-label">Overview</div>
            <div className="nav-grid">
              {SKILLS.filter(s => s.group === 'overview').map(s => (
                <button key={s.key} className={`nav-btn ${skill === s.key ? 'active' : ''}`} onClick={() => setSkill(s.key)}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>

            <div className="nav-section-label">Lifeskills</div>
            <div className="nav-grid">
              {SKILLS.filter(s => s.group === 'lifeskill').map(s => (
                <button key={s.key} className={`nav-btn ${skill === s.key ? 'active' : ''}`} onClick={() => setSkill(s.key)}>
                  {s.icon} {s.label}
                </button>
              ))}
            </div>
          </nav>

          <main className="content">
            <GlobalLeaderboard key={`${skill}-${region}`} skill={skill} region={region} />
            <AddPlayer />
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
