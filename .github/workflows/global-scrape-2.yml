name: Global Scrape — Run 2

on:
  schedule:
    - cron: '0 6 * * *'   # 6 AM UTC daily (picks up players missed by run 1)
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYY-MM-DD), empty = yesterday'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Create Docker network
        run: docker network create clarity-net

      - name: Start Redis
        run: |
          docker run -d --name clarity-redis \
            --network clarity-net \
            redis:7-alpine

      - name: Start bdo-api
        run: |
          docker run -d --name bdo-api \
            --network clarity-net \
            -p 8001:8001 \
            man90/bdo-rest-api:latest \
            -redis redis://clarity-redis:6379/0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scraper

      - name: Run global scraper — remaining players (EU/NA/SA)
        run: node scrape-global.js
        working-directory: scraper
        env:
          BDO_API_URL: http://localhost:8001
          CLARITY_SERVER_URL: https://clarity-guild.live
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          TARGET_DATE: ${{ github.event.inputs.date }}
